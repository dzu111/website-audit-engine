<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Audit Engine</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--text-main); }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="url"] {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="url"]:focus { border-color: var(--accent); }
        button {
            padding: 14px 28px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent);
            color: #0f172a;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: #334155; color: var(--text-muted); cursor: not-allowed; }
        #status { color: var(--accent); font-weight: 500; margin-bottom: 20px; display: none; }
        #result {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            white-space: pre-wrap;
            display: none;
            font-size: 1rem;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <h1>AI Website Audit Engine</h1>
    <p class="subtitle">Enter a corporate site URL to instantly trigger a multi-agent UI/UX and Technical performance analysis.</p>
    
    <div class="input-group">
        <input type="url" id="urlInput" placeholder="https://example.com.my" required>
        <button id="submitBtn" onclick="runAudit()">Run AI Audit</button>
    </div>
    
    <div id="status"></div>
    <div id="result"></div>

    <script>
        async function runAudit() {
            const urlInput = document.getElementById('urlInput');
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            
            if (!urlInput.value) {
                alert('Please enter a valid URL');
                return;
            }

            // UI Feedback State
            urlInput.disabled = true;
            submitBtn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.innerText = '⚙️ Coordinating AI Agents... Compiling data threads.';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/api/orchestrator', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput.value })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.innerText = '✅ Audit successfully compiled by orchestration layer:';
                    resultDiv.style.display = 'block';
                    resultDiv.innerText = data.auditReport;
                } else {
                    statusDiv.innerText = '❌ Orchestration Failure';
                    resultDiv.style.display = 'block';
                    resultDiv.innerText = `Error: ${data.error || 'Unknown error occurred.'}`;
                }
            } catch (error) {
                statusDiv.innerText = '❌ Connection Error';
                resultDiv.style.display = 'block';
                resultDiv.innerText = 'Failed to reach the serverless orchestration function.';
            } finally {
                urlInput.disabled = false;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
